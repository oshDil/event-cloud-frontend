# Cluster DNS resolver — "kube-dns" is the conventional Service name for
# the in-cluster DNS (CoreDNS) on both kind and EKS. Used so proxy_pass
# targets below resolve per-request instead of once at startup: if a
# backend service doesn't exist in this cluster (e.g. analytics-service,
# deliberately not deployed to EKS since ClickHouse isn't reachable from
# AWS), only requests to that one route fail with a 502 — Nginx itself
# still starts and serves everything else. Without this, an unresolvable
# static proxy_pass host prevents Nginx from starting at all.
resolver kube-dns.kube-system.svc.cluster.local valid=10s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to backend ClusterIP services by their
    # in-cluster DNS names, stripping the /api prefix. Replaces the
    # Kubernetes Ingress layer entirely — one Nginx (already needed to
    # serve the SPA) is doing routing that would otherwise need a separate
    # ingress controller and Load Balancer.
    location /api/events {
        set $upstream_event http://event-service.eventcloud.svc.cluster.local:4001;
        rewrite ^/api/events(.*)$ /events$1 break;
        proxy_pass $upstream_event;
    }

    location /api/program {
        set $upstream_program http://program-service.eventcloud.svc.cluster.local:4002;
        rewrite ^/api/program(.*)$ /program$1 break;
        proxy_pass $upstream_program;
    }

    location /api/register {
        set $upstream_registration http://registration-service.eventcloud.svc.cluster.local:4003;
        rewrite ^/api/register$ /register break;
        proxy_pass $upstream_registration;
    }

    location /api/registrations {
        set $upstream_registration http://registration-service.eventcloud.svc.cluster.local:4003;
        rewrite ^/api/registrations$ /registrations break;
        proxy_pass $upstream_registration;
    }

    location /api/analytics {
        set $upstream_analytics http://analytics-service.eventcloud.svc.cluster.local:4004;
        rewrite ^/api/analytics$ /analytics break;
        proxy_pass $upstream_analytics;
    }

    # SPA fallback: React Router handles routing client-side, so any path
    # that isn't a real static file or the API routes above should still
    # serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
