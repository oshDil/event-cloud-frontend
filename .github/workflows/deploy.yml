name: Build and Blue-Green Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write # required for OIDC — this is what lets AWS trust the run without stored keys
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: eventcloud
  NAMESPACE: eventcloud
  SERVICE: frontend
  IMAGE: oshdil/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::251774438698:role/github-actions-eventcloud-deploy
          aws-region: ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Determine active and target colors
        id: colors
        run: |
          ACTIVE=$(kubectl get svc ${{ env.SERVICE }} -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.selector.version}')
          if [ "$ACTIVE" = "blue" ]; then TARGET="green"; else TARGET="blue"; fi
          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Currently live: $ACTIVE — deploying to: $TARGET"

      - name: Deploy new image to the inactive color
        run: |
          kubectl set image deployment/${{ env.SERVICE }}-${{ steps.colors.outputs.target }} \
            ${{ env.SERVICE }}=${{ env.IMAGE }}:${{ needs.build-and-push.outputs.image_tag }} \
            -n ${{ env.NAMESPACE }}
          kubectl scale deployment/${{ env.SERVICE }}-${{ steps.colors.outputs.target }} \
            --replicas=2 -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.SERVICE }}-${{ steps.colors.outputs.target }} \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Smoke test the inactive color directly (bypassing the live Service)
        run: |
          kubectl port-forward deployment/${{ env.SERVICE }}-${{ steps.colors.outputs.target }} \
            18080:80 -n ${{ env.NAMESPACE }} &
          sleep 5
          curl -f http://localhost:18080/

      - name: Switch live traffic to the new color
        run: |
          kubectl patch svc ${{ env.SERVICE }} -n ${{ env.NAMESPACE }} \
            -p "{\"spec\":{\"selector\":{\"app\":\"${{ env.SERVICE }}\",\"version\":\"${{ steps.colors.outputs.target }}\"}}}"
          echo "Live traffic switched to ${{ steps.colors.outputs.target }}"

      - name: Scale down the old color
        run: |
          kubectl scale deployment/${{ env.SERVICE }}-${{ steps.colors.outputs.active }} \
            --replicas=0 -n ${{ env.NAMESPACE }}
